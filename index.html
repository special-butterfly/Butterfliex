<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterfly GAN Explorer</title>
    <meta name="description"
        content="Generate and mutate unique butterflies using a Generative Adversarial Network (GAN).">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="glass-header">
            <h1>Butterfly GAN Explorer</h1>
            <p>Select a model version and click on any butterfly to "mutate" variations of it!</p>

            <div class="controls">
                <div class="control-group">
                    <label for="model-select">Model Version:</label>
                    <div class="select-wrapper">
                        <select id="model-select">
                            <option value="butterfly_generator500.onnx">Epoch 500</option>
                            <option value="butterfly_generator450.onnx">Epoch 450</option>
                            <option value="butterfly_generator350.onnx">Epoch 350</option>
                            <option value="butterfly_generator250.onnx">Epoch 250</option>
                            <option value="butterfly_generator150.onnx">Epoch 150</option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <label for="mutation-slider">Mutation Rate:</label>
                    <div class="slider-wrapper">
                        <input type="range" id="mutation-slider" min="0" max="1" step="0.05" value="0.2">
                        <span id="mutation-value">0.2</span>
                    </div>
                </div>

                <button id="generate-btn" class="primary-btn">Generate Random Butterflies</button>
            </div>
        </header>

        <main>
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <p id="loading-text">Loading Model...</p>
            </div>

            <div class="butterfly-grid" id="grid">
                <!-- Canvases will be injected here via JS -->
            </div>
        </main>

        <footer>
            <p>Powered by PyTorch, ONNX Runtime Web, and Generative Adversarial Networks.</p>
        </footer>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>

</html>
